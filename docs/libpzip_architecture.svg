<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1b1f24; }
      .section { font: 700 18px Arial, sans-serif; fill: #1b1f24; }
      .text { font: 14px Arial, sans-serif; fill: #1b1f24; }
      .small { font: 12px Arial, sans-serif; fill: #1b1f24; }
      .box { stroke: #4b5563; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">libpzip Current Architecture</text>

  <rect x="40" y="90" width="230" height="140" class="box" fill="#dbeafe"/>
  <text x="155" y="120" text-anchor="middle" class="section">C API / CLI</text>
  <text x="60" y="150" class="text">pzip_create</text>
  <text x="60" y="172" class="text">pzip_set_codec</text>
  <text x="60" y="194" class="text">pzip_open_archive</text>
  <text x="60" y="216" class="text">pzip_add_path / pzip_run</text>

  <rect x="320" y="120" width="140" height="80" class="box" fill="#dbeafe"/>
  <text x="390" y="155" text-anchor="middle" class="section">pzip_ctx</text>
  <text x="390" y="178" text-anchor="middle" class="small">wrapper</text>

  <rect x="520" y="90" width="250" height="110" class="box" fill="#e5e7eb"/>
  <text x="645" y="122" text-anchor="middle" class="section">PzipEngine</text>
  <text x="540" y="150" class="text">m_options / m_files / m_archivePath</text>
  <text x="540" y="172" class="text">m_codec / m_encryption / m_running</text>

  <rect x="520" y="220" width="250" height="90" class="box" fill="#e5e7eb"/>
  <text x="645" y="252" text-anchor="middle" class="section">Error / Lifecycle</text>
  <text x="540" y="280" class="text">lastError / cancel / state</text>

  <rect x="840" y="70" width="700" height="430" class="box" fill="#ecfdf5"/>
  <text x="870" y="100" class="section">Compression Pipeline</text>

  <rect x="880" y="130" width="180" height="85" class="box" fill="#bbf7d0"/>
  <text x="970" y="162" text-anchor="middle" class="section">Reader Thread</text>
  <text x="900" y="190" class="text">FileReader.readFileInChunks</text>

  <rect x="1110" y="145" width="180" height="55" class="box" fill="#bbf7d0"/>
  <text x="1200" y="178" text-anchor="middle" class="section">Chunk Queue</text>

  <rect x="1340" y="130" width="160" height="85" class="box" fill="#bbf7d0"/>
  <text x="1420" y="162" text-anchor="middle" class="section">Worker Pool</text>
  <text x="1368" y="190" class="text">parallel workers</text>

  <rect x="880" y="270" width="190" height="90" class="box" fill="#bbf7d0"/>
  <text x="975" y="302" text-anchor="middle" class="section">Chunk Aggregation</text>
  <text x="900" y="330" class="text">PendingChunkShard</text>
  <text x="900" y="350" class="text">group by fileIndex</text>

  <rect x="1110" y="270" width="180" height="90" class="box" fill="#bbf7d0"/>
  <text x="1200" y="302" text-anchor="middle" class="section">Merge Buffer</text>
  <text x="1130" y="330" class="text">reusableMergeBuffer</text>

  <rect x="1340" y="260" width="180" height="110" class="box" fill="#bbf7d0"/>
  <text x="1430" y="292" text-anchor="middle" class="section">compressChunkTask</text>
  <text x="1360" y="320" class="text">Crc32</text>
  <text x="1360" y="340" class="text">Codec Compress</text>

  <rect x="930" y="405" width="180" height="55" class="box" fill="#bbf7d0"/>
  <text x="1020" y="438" text-anchor="middle" class="section">Write Queue</text>

  <rect x="1170" y="395" width="190" height="90" class="box" fill="#bbf7d0"/>
  <text x="1265" y="425" text-anchor="middle" class="section">Writer Thread</text>
  <text x="1190" y="450" class="text">optional encryption</text>
  <text x="1190" y="470" class="text">ZipWriter.writeEntry/Directory</text>

  <rect x="1410" y="410" width="100" height="60" class="box" fill="#bbf7d0"/>
  <text x="1460" y="447" text-anchor="middle" class="section">archive.zip</text>

  <rect x="840" y="540" width="700" height="230" class="box" fill="#eef2ff"/>
  <text x="870" y="570" class="section">Decompression / Extension</text>

  <rect x="880" y="600" width="250" height="110" class="box" fill="#c7d2fe"/>
  <text x="1005" y="632" text-anchor="middle" class="section">extractArchive</text>
  <text x="900" y="660" class="text">read local header</text>
  <text x="900" y="682" class="text">select codec by method</text>
  <text x="900" y="704" class="text">verify crc32 / write files</text>

  <rect x="1180" y="590" width="190" height="120" class="box" fill="#c7d2fe"/>
  <text x="1275" y="622" text-anchor="middle" class="section">Codec Factories</text>
  <text x="1200" y="650" class="text">default zstd</text>
  <text x="1200" y="672" class="text">zlib / zstd / lz4</text>
  <text x="1200" y="694" class="text">vtable based</text>

  <rect x="1400" y="590" width="110" height="120" class="box" fill="#c7d2fe"/>
  <text x="1455" y="622" text-anchor="middle" class="section">Encryption</text>
  <text x="1455" y="648" text-anchor="middle" class="small">optional</text>
  <text x="1455" y="670" text-anchor="middle" class="small">vtable</text>

  <rect x="40" y="540" width="340" height="120" class="box" fill="#fef3c7"/>
  <text x="210" y="572" text-anchor="middle" class="section">solid_mode</text>
  <text x="60" y="600" class="text">exists in pzip_options only</text>
  <text x="60" y="622" class="text">current run() has no dedicated solid branch</text>
  <text x="60" y="644" class="text">current pipeline is still file-oriented</text>

  <rect x="40" y="720" width="500" height="160" class="box" fill="#f9fafb"/>
  <text x="60" y="750" class="section">Notes</text>
  <text x="60" y="780" class="text">1. Default codec is zstd</text>
  <text x="60" y="804" class="text">2. Compression path: reader -&gt; worker pool -&gt; writer</text>
  <text x="60" y="828" class="text">3. Decompression selects codec by ZIP method</text>
  <text x="60" y="852" class="text">4. lz4 uses a pzip custom ZIP method</text>

  <line x1="270" y1="160" x2="320" y2="160" class="arrow"/>
  <line x1="460" y1="160" x2="520" y2="145" class="arrow"/>
  <line x1="770" y1="145" x2="880" y2="172" class="arrow"/>
  <line x1="1060" y1="172" x2="1110" y2="172" class="arrow"/>
  <line x1="1290" y1="172" x2="1340" y2="172" class="arrow"/>
  <line x1="1420" y1="215" x2="1420" y2="260" class="arrow"/>
  <line x1="1340" y1="315" x2="1290" y2="315" class="arrow"/>
  <line x1="1110" y1="315" x2="1070" y2="315" class="arrow"/>
  <line x1="975" y1="360" x2="975" y2="405" class="arrow"/>
  <line x1="1110" y1="432" x2="1170" y2="440" class="arrow"/>
  <line x1="1360" y1="440" x2="1410" y2="440" class="arrow"/>

  <line x1="645" y1="200" x2="645" y2="220" class="arrow"/>
  <line x1="770" y1="180" x2="1180" y2="650" class="arrow"/>
  <line x1="1370" y1="650" x2="1130" y2="650" class="arrow"/>
  <line x1="1180" y1="650" x2="1130" y2="650" class="arrow"/>
  <line x1="1400" y1="650" x2="1360" y2="470" class="arrow"/>
  <line x1="1400" y1="650" x2="1130" y2="650" class="arrow"/>
  <line x1="380" y1="600" x2="520" y2="150" class="arrow"/>
</svg>